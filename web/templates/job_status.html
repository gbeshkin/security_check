<!doctype html><html><head><meta charset="utf-8"/><title>Scan in Progress</title><meta name="viewport" content="width=device-width, initial-scale=1"/><style>body{font-family:Arial,sans-serif;margin:32px;background:#f5f7fb;color:#111827}.card{max-width:860px;margin:0 auto;background:white;border-radius:18px;padding:24px;box-shadow:0 8px 28px rgba(0,0,0,.08)}.status{font-size:20px;font-weight:700;margin:12px 0}.muted{color:#6b7280}.spinner{width:42px;height:42px;border:4px solid #e5e7eb;border-top-color:#111827;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}@keyframes spin{to{transform:rotate(360deg)}}a{color:#0f62fe;text-decoration:none}</style></head><body><div class="card"><div class="spinner"></div><h1>Scan job</h1><p><strong>Scan ID:</strong> {{ scan_id }}</p><p class="status" id="statusText">Checking job status...</p><p class="muted" id="repoText"></p><p class="muted" id="providerText"></p><p class="muted" id="errorText"></p><p><a href="/">Back to home</a></p></div><script>const scanId="{{ scan_id }}";async function poll(){try{const res=await fetch(`/api/jobs/${scanId}`);const data=await res.json();document.getElementById("statusText").textContent=`Status: ${data.status}`;document.getElementById("repoText").textContent=data.repo_url?`Repository: ${data.repo_url}`:"";document.getElementById("providerText").textContent=data.provider?`Provider: ${data.provider}`:"";document.getElementById("errorText").textContent=data.error?`Error: ${data.error}`:"";if(data.status==="completed"&&data.report_ready){window.location.href=`/report/${scanId}`;return;}if(data.status==="failed"){return;}}catch(e){document.getElementById("errorText").textContent="Could not load job status.";}setTimeout(poll,3000);}poll();</script></body></html>
